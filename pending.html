<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Approvals | QZ Admin</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #facc15; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; }
        .sidebar { width: 250px; height: 100vh; background: var(--card); border-right: 2px solid var(--primary); padding: 20px; position: fixed; }
        .main-content { margin-left: 270px; padding: 30px; width: 100%; }
        table { width: 100%; background: var(--card); border-radius: 12px; overflow: hidden; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: var(--primary); background: #334155; }
        .action-btn { padding: 8px 12px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-watch { background: #3b82f6; color: white; }
        .btn-approve { background: #22c55e; color: white; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--primary);">QZ ADMIN</h2>
    <hr border="1" color="#334155">
    <br>
    <a href="admin-panel.html" style="color: white; text-decoration: none; display: block; margin-bottom: 15px;">Dashboard</a>
    <a href="pending.html" style="color: var(--primary); text-decoration: none; display: block; margin-bottom: 15px; font-weight: bold;">Pending Approvals</a>
    <a href="users.html" style="color: white; text-decoration: none; display: block; margin-bottom: 15px;">Users</a>
</div>

<div class="main-content">
    <h2>Pending Submissions</h2>
    <table>
        <thead>
            <tr>
                <th>Seller WhatsApp</th>
                <th>Price</th>
                <th>Proof Video</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><a href="#" style="color:#22c55e;">+92 300 1234567</a></td>
                <td>Rs. 30,000</td>
                <td>
                    <button class="action-btn btn-watch" onclick="alert('Playing Seller ID Video...')">
                        <i class="fas fa-eye"></i> WATCH VIDEO
                    </button>
                </td>
                <td>
                    <button class="action-btn btn-approve">APPROVE</button>
                    <button class="action-btn" style="background: #ef4444; color: white;">REJECT</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
