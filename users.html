        :root { --primary: #facc15; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; }
        
        /* Sidebar Styles */
        .sidebar { width: 250px; height: 100vh; background: var(--card); border-right: 2px solid var(--primary); padding: 20px; position: fixed; }
        .sidebar h2 { color: var(--primary); font-size: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .nav-link { display: block; padding: 12px; color: #94a3b8; text-decoration: none; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; }
        .nav-link:hover { background: rgba(250, 204, 21, 0.1); color: var(--primary); }
        .nav-link.active { background: var(--primary); color: #000; font-weight: bold; }

        /* Main Content Styles */
        .main-content { margin-left: 270px; padding: 30px; width: calc(100% - 270px); }
        h2 { color: var(--primary); margin-bottom: 30px; }
        
        table { width: 100%; background: var(--card); border-collapse: collapse; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
        th { background: #334155; text-align: left; padding: 15px; color: var(--primary); text-transform: uppercase; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #334155; font-size: 14px; }
        
        .whatsapp-tag { color: #22c55e; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 5px; }
        .whatsapp-tag:hover { text-decoration: underline; }
        
        .action-btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-size: 12px; font-weight: bold; background: #ef4444; color: white; transition: 0.3s; }
        .action-btn:hover { opacity: 0.8; }
    </style>
