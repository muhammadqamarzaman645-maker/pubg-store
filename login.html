<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dream Graphics Store</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 350px; border-top: 5px solid #facc15; }
        h2 { text-align: center; color: #facc15; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; }
        input { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn-action { width: 100%; background: #facc15; color: #000; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        p { text-align: center; font-size: 13px; color: #94a3b8; }
        a { color: #facc15; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Welcome Back</h2>
        <form action="dashboard.html">
            <div class="form-group">
                <label>Email / Character ID</label>
                <input type="text" placeholder="Enter details" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-action">LOGIN NOW</button>
        </form>
        <p>Don't have an account? <a href="register.html">Register Here</a></p>
    </div>
</body>
</html>
